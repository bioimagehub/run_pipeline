name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Build binary
        shell: bash
        run: |
          VERSION_VALUE="$(tr -d '\r\n' < VERSION)"
          COMMIT_VALUE="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUTPUT_NAME="run_pipeline"
          if [ "${{ runner.os }}" = "Windows" ]; then
            OUTPUT_NAME="run_pipeline.exe"
          fi
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION_VALUE} -X main.Commit=${COMMIT_VALUE} -X main.BuildDate=${BUILD_DATE}" \
            -o "${OUTPUT_NAME}" .
