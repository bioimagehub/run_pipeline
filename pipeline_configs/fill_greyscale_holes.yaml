run:
- name: Fill greyscale holes in bright objects
  environment: uv@3.11:default
  commands:
  - python
  - '%REPO%/standard_code/python/fill_greyscale_holes.py'
  - --input-search-pattern: '%YAML%/input_data/**/*.tif'
  - --output-folder: '%YAML%/output_data'

- name: Fill holes with local kernel and delta output
  environment: uv@3.11:default
  commands:
  - python
  - '%REPO%/standard_code/python/fill_greyscale_holes.py'
  - --input-search-pattern: '%YAML%/input_data/**/*.tif'
  - --output-folder: '%YAML%/output_data'
  - --kernel-size: 40
  - --kernel-overlap: half
  - --return-delta
