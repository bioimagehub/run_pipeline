run:
- name: Convert ND2 to OME-TIFF with bfconvert
  environment: uv@3.11:default
  commands:
  - python
  - '%REPO%/standard_code/python/bfconvert_wrapper.py'
  - --input-search-pattern: '%YAML%/input_data/**/*.nd2'
  - --output-folder: '%YAML%/output_data'

- name: Convert CZI series 0 only
  environment: uv@3.11:default
  commands:
  - python
  - '%REPO%/standard_code/python/bfconvert_wrapper.py'
  - --input-search-pattern: '%YAML%/input_data/**/*.czi'
  - --output-folder: '%YAML%/output_data'
  - --series: '0'
