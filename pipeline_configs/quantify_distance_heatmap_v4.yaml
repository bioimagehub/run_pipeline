run:
- name: Quantify TSV heatmaps with DBSCAN (v4)
  environment: uv@3.11:default
  commands:
  - python
  - '%REPO%/standard_code/python/plots/quantify_distance_heatmap_v4.py'
  - --input-search-pattern: '%YAML%/quantification_bulk/*bulk_per_distance.tsv'
  - --output-folder: '%YAML%/quantification_bulk'
  - --clustering-eps: 0.20
  - --clustering-min-samples: 30
  - --clustering-intensity-threshold: 50.0
