run:
- name: Bilateral denoise with default settings
  environment: uv@3.11:default
  commands:
  - python
  - '%REPO%/standard_code/python/denoise_bilateral.py'
  - --input-search-pattern: '%YAML%/input_data/**/*.tif'
  - --output-folder: '%YAML%/output_data'

- name: Bilateral denoise with stronger smoothing
  environment: uv@3.11:default
  commands:
  - python
  - '%REPO%/standard_code/python/denoise_bilateral.py'
  - --input-search-pattern: '%YAML%/input_data/**/*.tif'
  - --output-folder: '%YAML%/output_data'
  - --filter-size: 9
  - --sigma-color: 0.15
  - --sigma-space: 5
